version: "1.1"
dataset: "kb_chunk_export"
owner_team: "C401_B4"

source_map:
  - doc_id: "policy_refund_v4"
    path: "data/docs/policy_refund_v4.txt"
    ingest_mode: "CSV export -> ETL run"
    failure_mode: "stale_refund_window"
    metric: "expectation halt when chunk_text still contains 14-day refund window"
  - doc_id: "sla_p1_2026"
    path: "data/docs/sla_p1_2026.txt"
    ingest_mode: "CSV export -> ETL run"
    failure_mode: "missing_effective_date / invalid_exported_at"
    metric: "quarantine count and freshness status"
  - doc_id: "it_helpdesk_faq"
    path: "data/docs/it_helpdesk_faq.txt"
    ingest_mode: "CSV export -> ETL run"
    failure_mode: "duplicate_chunk_text"
    metric: "dedupe removed from cleaned count"
  - doc_id: "hr_leave_policy"
    path: "data/docs/hr_leave_policy.txt"
    ingest_mode: "CSV export -> ETL run"
    failure_mode: "stale_hr_policy_effective_date"
    metric: "quarantine when effective_date < cutoff"

schema_cleaned:
  chunk_id:
    type: string
    required: true
    description: "ID ổn định sau clean (hash doc_id + chunk_text + seq)"
  doc_id:
    type: string
    required: true
    description: "Khóa logic tài liệu nguồn"
  chunk_text:
    type: string
    required: true
    constraints:
      min_length: 8
      no_invisible_chars: true
  effective_date:
    type: date
    required: true
    description: "Ngày hiệu lực chuẩn hóa sang YYYY-MM-DD"
  exported_at:
    type: datetime
    required: true
    description: "Chuẩn hóa ISO 8601 để freshness / lineage đọc ổn định"

quality_rules:
  - id: "min_one_row"
    description: "Cleaned dataset must have at least 1 record"
    severity: "halt"
  - id: "no_empty_doc_id"
    description: "All records must have non-empty doc_id"
    severity: "halt"
  - id: "no_duplicate_chunk_text"
    description: "Auto-dedup by normalized text; quarantine duplicates"
    severity: "warn"
  - id: "no_stale_refund_window"
    description: "Policy refund v4 must contain '7 ngày' not '14 ngày'; auto-fix if apply_refund_window_fix=True"
    severity: "halt"
  - id: "chunk_min_length_8"
    description: "All chunk_text must be ≥ 8 characters"
    severity: "warn"
  - id: "effective_date_iso_yyyy_mm_dd"
    description: "All effective_date must be ISO YYYY-MM-DD format"
    severity: "halt"
  - id: "hr_leave_no_stale_10d_annual"
    description: "HR leave policy must have effective_date ≥ 2026-01-01"
    severity: "halt"
  - id: "exported_at_parseable_iso8601"
    description: "All exported_at values must parse as ISO 8601 datetime"
    severity: "halt"
  - id: "chunk_text_no_invisible_chars"
    description: "Chunk text must not contain BOM or zero-width characters after sanitize"
    severity: "warn"
  - id: "unique_cleaned_chunk_id"
    description: "Each cleaned chunk_id must be unique for idempotent upsert"
    severity: "halt"

freshness:
  measured_at: "publish"
  sla_hours: 24
  alert_channel: "stdout + manifest JSON"

canonical_sources:
  - path: "data/docs/policy_refund_v4.txt"
    doc_id: "policy_refund_v4"
  - path: "data/docs/sla_p1_2026.txt"
    doc_id: "sla_p1_2026"
  - path: "data/docs/it_helpdesk_faq.txt"
    doc_id: "it_helpdesk_faq"
  - path: "data/docs/hr_leave_policy.txt"
    doc_id: "hr_leave_policy"

allowed_doc_ids:
  - policy_refund_v4
  - sla_p1_2026
  - it_helpdesk_faq
  - hr_leave_policy

policy_versioning:
  policy_refund_v4_version: "v4"
  policy_refund_v4_effective: "2026-02-01"
  policy_refund_v4_rule: "7-day refund window (NOT 14 days from v3)"
  sla_p1_2026_effective: "2026-01-01"
  sla_p1_2026_rule: "P1 ticket = 15 min response + 4h resolution"
  hr_leave_min_effective_date: "2026-01-01"
  hr_leave_rule: "Reject records with effective_date < cutoff (prevents stale guidance)"

quarantine_reason_codes:
  - unknown_doc_id
  - invalid_effective_date_format
  - missing_effective_date
  - missing_chunk_text
  - duplicate_chunk_text
  - stale_hr_policy_effective_date
  - missing_source_chunk_id
  - duplicate_source_chunk_id
  - missing_exported_at
  - invalid_exported_at_format

raw_export:
  path: "data/raw/policy_export_dirty.csv"
  format: "CSV: chunk_id, doc_id, chunk_text, effective_date, exported_at"
  encoding: "UTF-8"

sprint1_result:
  run_id: "sprint1"
  raw_records: 10
  cleaned_records: 6
  quarantine_records: 4
  artifacts:
    - "artifacts/logs/run_sprint1.log"
    - "artifacts/cleaned/cleaned_sprint1.csv"
    - "artifacts/quarantine/quarantine_sprint1.csv"
    - "artifacts/manifests/manifest_sprint1.json"
  embeddings: "6 vectors upserted to ChromaDB (collection: day10_kb)"
  freshness_sla_status: "FAIL (sample export is older than 24h)"
